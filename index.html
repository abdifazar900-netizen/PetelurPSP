<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petelur App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary: #8D6E63; }
        body { background-color: #f4f1ea; padding-bottom: 70px; }
        .header { background: var(--primary); color: white; padding: 15px; position: sticky; top: 0; z-index: 100; }
        .section { display: none; }
        .section.active { display: block; }
        #loginPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; }
        .nav-item { color: #999; cursor: pointer; text-align: center; flex: 1; font-size: 12px; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div id="loginPage">
    <div class="card p-4 shadow" style="width: 320px;">
        <h5 class="text-center mb-4">PETELUR APP</h5>
        <input type="text" id="username" class="form-control mb-2" placeholder="Username">
        <input type="password" id="password" class="form-control mb-3" placeholder="Password">
        <button class="btn w-100 text-white" style="background: var(--primary);" onclick="login()">MASUK</button>
    </div>
</div>

<div id="mainApp" style="display: none;">
    <div class="header d-flex justify-content-between">
        <span id="date-widget"></span>
        <i class="bi bi-box-arrow-right" onclick="logout()"></i>
    </div>

    <div class="container mt-3">
        <div id="beranda" class="section active">
            <div class="card p-3 mb-3 text-center shadow-sm">
                <small>Total Populasi Ayam</small>
                <h1 id="total-pop">...</h1>
            </div>
            <h6><i class="bi bi-exclamation-triangle"></i> Masalah Aktif</h6>
            <div id="list-masalah">Memuat...</div>
        </div>

        <div id="data" class="section">
            <h6>Tambah Populasi</h6>
            <div class="card p-3 shadow-sm">
                <input type="text" id="knd_pop" class="form-control mb-2" placeholder="Kandang">
                <input type="number" id="usia_awal" class="form-control mb-2" placeholder="Usia Minggu">
                <input type="date" id="tgl_datang" class="form-control mb-3">
                <button class="btn btn-primary w-100" onclick="simpan('simpanPopulasi')">Simpan</button>
            </div>
        </div>

        <div id="produksi" class="section">
            <h6>Input Produksi</h6>
            <div class="card p-3 shadow-sm">
                <input type="date" id="tgl_prod" class="form-control mb-2">
                <input type="number" id="jml_telur" class="form-control mb-3" placeholder="Butir">
                <button class="btn btn-success w-100" onclick="simpan('simpanProduksi')">Simpan</button>
            </div>
        </div>

        <div id="catatan" class="section">
            <h6>Input Masalah</h6>
            <div class="card p-3 shadow-sm">
                <input type="date" id="tgl_msl" class="form-control mb-2">
                <input type="text" id="knd_msl" class="form-control mb-2" placeholder="Kandang">
                <input type="text" id="msl_ayam" class="form-control mb-2" placeholder="Masalah (Sakit/Mati)">
                <textarea id="ket_msl" class="form-control mb-3" placeholder="Keterangan"></textarea>
                <button class="btn btn-danger w-100" onclick="simpan('simpanMasalah')">Simpan</button>
            </div>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-item active" onclick="showSection('beranda', this)"><i class="bi bi-house d-block fs-4"></i>Home</div>
        <div class="nav-item" onclick="showSection('data', this)"><i class="bi bi-plus-circle d-block fs-4"></i>Data</div>
        <div class="nav-item" onclick="showSection('produksi', this)"><i class="bi bi-egg d-block fs-4"></i>Produksi</div>
        <div class="nav-item" onclick="showSection('catatan', this)"><i class="bi bi-journal-text d-block fs-4"></i>Catatan</div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxziXs6x7kf4NdGubdKCS_sClVjRkE-p2dfgqy4PR43r2cxGNRmTIfV0WBDOkGcF3FapQ/exec";

    async function call(params) {
        const query = new URLSearchParams(params).toString();
        try {
            const res = await fetch(`${SCRIPT_URL}?${query}`);
            return await res.json();
        } catch (e) { return null; }
    }

    async function login() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const res = await call({ action: "checkLogin", u: u, p: p });
        if (res && res.auth) {
            localStorage.setItem("isLoggedIn", "true");
            location.reload();
        } else { alert("Gagal!"); }
    }

    function logout() { localStorage.clear(); location.reload(); }

    function showSection(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(el) el.classList.add('active');
        if(id === 'beranda') loadDash();
    }

    async function loadDash() {
        const res = await call({ action: "getDashboard" });
        if (res) {
            document.getElementById('total-pop').innerText = res.totalPopulasi;
            const list = document.getElementById('list-masalah');
            list.innerHTML = res.masalahActive.length ? "" : "Tidak ada masalah";
            res.masalahActive.forEach(m => {
                list.innerHTML += `<div class="card p-2 mb-2 border-start border-danger border-4">
                    <strong>Kandang ${m.kandang}</strong>: ${m.masalah}</div>`;
            });
        }
    }

    async function simpan(action) {
        let p = { action: action };
        if(action === 'simpanPopulasi') {
            p.kandang = document.getElementById('knd_pop').value;
            p.usia_awal = document.getElementById('usia_awal').value;
            p.tgl_datang = document.getElementById('tgl_datang').value;
            p.usia_skrg = p.usia_awal;
        } else if(action === 'simpanProduksi') {
            p.tgl = document.getElementById('tgl_prod').value;
            p.jumlah = document.getElementById('jml_telur').value;
        } else if(action === 'simpanMasalah') {
            p.tgl = document.getElementById('tgl_msl').value;
            p.kandang = document.getElementById('knd_msl').value;
            p.msl = document.getElementById('msl_ayam').value;
            p.ket = document.getElementById('ket_msl').value;
        }

        const res = await call(p);
        if(res && res.status === "success") { alert("Berhasil!"); location.reload(); }
    }

    window.onload = () => {
        document.getElementById('date-widget').innerText = new Date().toLocaleDateString('id-ID');
        if (localStorage.getItem("isLoggedIn") === "true") {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadDash();
        }
    };
</script>
</body>
</html>
