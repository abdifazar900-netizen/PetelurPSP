<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Petelur App</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8D6E63">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    :root { --primary-brown: #8D6E63; }
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
    .login-page {
      display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw;
      background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://lh3.googleusercontent.com/u/0/d/1R10YmDgHCX63mMgwskxLhhi16TzJb5nG');
      background-size: cover; background-position: center; position: fixed;
    }
    .glass-card {
      width: 340px; border-radius: 20px; padding: 30px; background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: white; text-align: center;
    }
    .section { display: none; padding: 15px; height: calc(100dvh - 130px); overflow-y: auto; background: #f8f9fa; }
    .active-section { display: block; }
    .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
    .nav-item { text-align: center; color: #aaa; font-size: 0.7rem; cursor: pointer; }
    .nav-item.active { color: var(--primary-brown); font-weight: bold; }
    .header-custom { background: var(--primary-brown); color: white; padding: 15px; border-radius: 0 0 15px 15px; }
  </style>
</head>
<body>

<div id="loginPage" class="login-page">
  <div class="glass-card">
    <h4 class="fw-bold">PETELUR PASIR PICUNG</h4>
    <p class="small mb-4 italic">"Bekerja dengan Itqan"</p>
    <input type="text" id="user" class="form-control mb-2" placeholder="Username">
    <input type="password" id="pass" class="form-control mb-3" placeholder="Password">
    <button class="btn btn-light w-100 fw-bold" onclick="login()" style="color:var(--primary-brown)">Masuk</button>
  </div>
</div>

<div id="mainApp" style="display:none;">
  <div class="header-custom d-flex justify-content-between align-items-center">
    <div><small id="date-widget"></small><h6 class="mb-0">Farm Dashboard</h6></div>
    <button class="btn btn-sm btn-outline-light" onclick="location.reload()"><i class="bi bi-box-arrow-right"></i></button>
  </div>

 <div id="beranda" class="section active-section">
  <div class="card p-4 text-center">
    <h6 class="text-muted">Total Populasi Ayam</h6>
    <h1 id="count_populasi" class="display-4 fw-bold text-brown">0</h1>
    <p class="mb-0">Ekor</p>
  </div>
<h6 class="fw-bold mb-3">Daftar Follow Up Masalah</h6>
  <div id="list_follow_up">
    <p class="text-muted text-center">Memuat data masalah...</p>
  </div>
</div>

  <div id="data" class="section">
  <h6>Input Populasi Kandang</h6>
  <div class="card p-3 shadow-sm">
    <input type="text" id="kandang" class="form-control mb-2" placeholder="No Kandang">
    <input type="number" id="usia_awal" class="form-control mb-2" placeholder="Usia Awal (Minggu)" oninput="hitungUsia()">
    <input type="date" id="tgl_datang" class="form-control mb-2" onchange="hitungUsia()">
    <div class="bg-light p-2 mb-3 rounded small text-center">Usia Hari Ini: <b id="display_usia">-</b></div>
    <input type="hidden" id="usia_skrg">
    <button class="btn w-100 text-white" style="background:var(--primary-brown)" onclick="sendData('simpanPopulasi')">Simpan Populasi</button>
  </div>
</div>

  <div id="produksi" class="section">
    <h6>Input Produksi Telur</h6>
    <div class="card p-3">
      <input type="date" id="tgl_prod" class="form-control mb-2">
      <input type="number" id="jml_telur" class="form-control mb-3" placeholder="Jumlah Butir">
      <button class="btn w-100 text-white" style="background:var(--primary-brown)" onclick="sendData('simpanProduksi')">Simpan ke Sheet</button>
    </div>
  </div>

  <div id="catatan" class="section">
    <h6>Input Masalah</h6>
    <div class="card p-3">
      <input type="date" id="tgl_catatan" class="form-control mb-2">
      <select id="select_kandang" class="form-select mb-2">
  <option value="">-- Pilih No Kandang --</option>
</select>
      <select id="masalah_ayam" class="form-select mb-2">
        <option>Sakit</option><option>Mati</option><option>Produksi Turun</option>
      </select>
      <textarea id="ket_masalah" class="form-control mb-3" placeholder="Keterangan"></textarea>
      <button class="btn w-100 text-white" style="background:var(--primary-brown)" onclick="sendData('simpanMasalah')">Simpan Masalah</button>
    </div>
  </div>

  <div class="nav-bottom">
  <div onclick="showSection('beranda', this)" class="nav-item active"><i class="bi bi-house d-block fs-5"></i>Home</div>
  <div onclick="showSection('data', this)" class="nav-item"><i class="bi bi-plus-circle d-block fs-5"></i>Data</div>
  <div onclick="showSection('produksi', this)" class="nav-item"><i class="bi bi-egg d-block fs-5"></i>Produksi</div>
  <div onclick="showSection('catatan', this)" class="nav-item"><i class="bi bi-journal-text d-block fs-5"></i>Catatan</div>
</div>

<script>
  // MASUKKAN URL APPS SCRIPT ANDA DI SINI
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxziXs6x7kf4NdGubdKCS_sClVjRkE-p2dfgqy4PR43r2cxGNRmTIfV0WBDOkGcF3FapQ/exec";

  async function login() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    const res = await fetch(SCRIPT_URL, {
      method: "POST", mode: "no-cors",
      body: JSON.stringify({ action: "checkLogin", u: u, p: p })
    });
    // Karena no-cors, kita anggap sukses jika tidak error atau gunakan login statis untuk kecepatan
    document.getElementById('loginPage').style.display='none';
    document.getElementById('mainApp').style.display='block';
  }
  window.onload = function() {
  if(localStorage.getItem("isLoggedIn") === "true") {
    document.getElementById('loginPage').style.display='none';
    document.getElementById('mainApp').style.display='block';
  }
}

 async function sendData(action) {
    let payload = { action: action };
    
    if(action === 'simpanProduksi') {
      payload.tgl = document.getElementById('tgl_prod').value;
      payload.jumlah = document.getElementById('jml_telur').value;
    } 
    else if(action === 'simpanPopulasi') {
      payload.kandang = document.getElementById('kandang').value; // Sesuai backend
      payload.usia_awal = document.getElementById('usia_awal').value;
      payload.tgl_datang = document.getElementById('tgl_datang').value;
      payload.usia_skrg = document.getElementById('usia_skrg').value;
    }

else if(action === 'simpanMasalah') {
  payload.tgl = document.getElementById('tgl_catatan').value;
  // PASTIKAN baris ini mengambil ID 'select_kandang' (dropdown)
  payload.kandang = document.getElementById('select_kandang').value; 
  payload.masalah = document.getElementById('masalah_ayam').value;
  payload.ket = document.getElementById('ket_masalah').value;
}

// ... kode fetch di bawahnya ...

    fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
.then(() => {
  alert("Data " + action + " berhasil dikirim!");
  
  // TAMBAHKAN KODE INI UNTUK MEMBERSIHKAN TAMPILAN
  if (action === 'simpanMasalah') {
    document.getElementById('tgl_catatan').value = "";
    document.getElementById('select_kandang').value = ""; // Membersihkan dropdown No Kandang
    document.getElementById('ket_masalah').value = "";    // Membersihkan Keterangan
  }
  
  if (action === 'simpanPopulasi') {
    document.getElementById('kandang').value = "";
    document.getElementById('usia_awal').value = "";
    document.getElementById('tgl_datang').value = "";
  }
  
  if (action === 'simpanProduksi') {
    document.getElementById('jml_telur').value = "";
  }
});
  }

// Tambahkan juga fungsi hitung usia agar otomatis [cite: 101, 102]
function hitungUsia() {
  const minggu = document.getElementById('usia_awal').value;
  const tgl = document.getElementById('tgl_datang').value;
  if(minggu && tgl) {
    const selisih = Math.floor((new Date() - new Date(tgl)) / (1000*60*60*24));
    const totalHari = (parseInt(minggu)*7) + selisih;
    const teks = Math.floor(totalHari/7) + " Minggu " + (totalHari%7) + " Hari";
    document.getElementById('display_usia').innerText = teks;
    document.getElementById('usia_skrg').value = teks;
  }
}

  function showSection(id, el) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
    document.getElementById(id).classList.add('active-section');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    if(id === 'catatan') loadKandangList(); 
  if(id === 'produksi') loadProduksi();
 if(id === 'beranda') loadTotalPopulasi();
  }
  function loadKandangList() {
  // GANTI DENGAN URL WEB APP ANDA YANG BARU
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxziXs6x7kf4NdGubdKCS_sClVjRkE-p2dfgqy4PR43r2cxGNRmTIfV0WBDOkGcF3FapQ/exec"; 

  fetch(SCRIPT_URL + "?action=getListKandang")
    .then(response => response.json())
    .then(list => {
      let html = '<option value="">-- Pilih No Kandang --</option>';
      list.forEach(i => {
        html += `<option value="${i.nomor}">${i.nomor}</option>`;
      });
      document.getElementById('select_kandang').innerHTML = html;
    })
    .catch(err => console.error("Error ambil data:", err));
}
  function loadTotalPopulasi() {
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxziXs6x7kf4NdGubdKCS_sClVjRkE-p2dfgqy4PR43r2cxGNRmTIfV0WBDOkGcF3FapQ/exec"; // Gunakan URL deployment terbaru
  
  fetch(SCRIPT_URL + "?action=getTotalPopulasi")
    .then(res => res.json())
    .then(data => {
      document.getElementById('count_populasi').innerText = data.total;
    })
    .catch(err => console.error("Gagal memuat total populasi:", err));
}
function loadFollowUp() {
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxziXs6x7kf4NdGubdKCS_sClVjRkE-p2dfgqy4PR43r2cxGNRmTIfV0WBDOkGcF3FapQ/exec";
  
  fetch(SCRIPT_URL + "?action=getMasalahAktif")
.then(res => {
  if (!res.ok) throw new Error('Network response was not ok');
  return res.json();
})
.then(data => {
      let html = "";
      if (data.length === 0) {
        html = '<div class="alert alert-success text-center">Semua ayam sehat!</div>';
      } else {
        data.forEach(item => {
          html += `
            <div class="card p-3 mb-2 border-start border-danger border-4">
              <div class="d-flex justify-content-between align-items-center">
                <div>
                  <h6 class="mb-0 fw-bold">Kandang: ${item.kandang}</h6>
                  <small class="text-danger">${item.masalah}</small><br>
                  <small class="text-muted">${item.ket}</small>
                </div>
                <button class="btn btn-sm btn-success" onclick="markSolved(${item.row})">Selesai</button>
              </div>
            </div>`;
        });
      }
      document.getElementById('list_follow_up').innerHTML = html;
    });
}

function markSolved(row) {
  if(!confirm("Yakin masalah ini sudah selesai?")) return;
  
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxziXs6x7kf4NdGubdKCS_sClVjRkE-p2dfgqy4PR43r2cxGNRmTIfV0WBDOkGcF3FapQ/exec";
  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ action: "markSolved", row: row })
  }).then(() => {
    alert("Berhasil diperbarui!");
    loadFollowUp(); // Refresh list
  });
}

// Panggil fungsi saat menu Home dibuka
// Di dalam showSection(id, el), tambahkan:
if(id === 'beranda') {
  loadTotalPopulasi();
  loadFollowUp();
}
// Pastikan fungsi ini dipanggil saat halaman pertama kali dibuka
window.onload = loadTotalPopulasi;

  document.getElementById('date-widget').innerText = new Date().toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long'});
</script>
</body>
</html>
